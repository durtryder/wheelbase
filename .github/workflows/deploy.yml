name: Build & deploy to Hostinger

# Every push to main rebuilds the web bundle and SFTPs it straight into
# Hostinger's public_html. No deploy branch, no Hostinger Git integration,
# no hPanel clicks.
#
# Also supports manual trigger via the Actions tab (workflow_dispatch).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Let deploys queue up rather than cancel — each push to main should ship.
concurrency:
  group: hostinger-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Fails fast if any required build secret is missing / empty. Only the
      # name gets logged on success/failure — nothing leaks.
      - name: Verify build secrets are present
        env:
          API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
          MEASUREMENT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID }}
          ACCESS_PASSWORD: ${{ secrets.EXPO_PUBLIC_ACCESS_PASSWORD }}
        run: |
          fail=0
          for name in API_KEY AUTH_DOMAIN PROJECT_ID STORAGE_BUCKET MESSAGING_SENDER_ID APP_ID MEASUREMENT_ID ACCESS_PASSWORD; do
            val=$(printenv "$name" || true)
            if [ -z "$val" ]; then
              echo "::error::EXPO_PUBLIC_FIREBASE_${name} (or ACCESS_PASSWORD) is EMPTY in this build"
              fail=1
            else
              echo "✓ ${name} is set"
            fi
          done
          if [ "$fail" = "1" ]; then exit 1; fi

      - name: Verify Hostinger FTP secrets are present
        env:
          FTP_SERVER: ${{ secrets.HOSTINGER_FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
        run: |
          fail=0
          for name in FTP_SERVER FTP_USERNAME FTP_PASSWORD; do
            val=$(printenv "$name" || true)
            if [ -z "$val" ]; then
              echo "::error::HOSTINGER_${name} is EMPTY in this build"
              fail=1
            else
              echo "✓ ${name} is set"
            fi
          done
          if [ "$fail" = "1" ]; then exit 1; fi

      - name: Build web bundle
        env:
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
          EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID }}
          EXPO_PUBLIC_ACCESS_PASSWORD: ${{ secrets.EXPO_PUBLIC_ACCESS_PASSWORD }}
        run: npx expo export --platform web

      - name: Confirm .htaccess is present
        run: test -f dist/.htaccess || (echo ".htaccess missing from dist/" && exit 1)

      # SamKirkland's FTP-Deploy-Action syncs a local directory to the FTP
      # target. It only uploads changed files (tracks hashes in a tiny
      # metadata file on the server), so after the initial full push each
      # subsequent deploy is a few seconds.
      #
      # Requires a Hostinger FTP account scoped to public_html/ — the FTP
      # session lands inside public_html so server-dir is './'.
      - name: Deploy to Hostinger via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./dist/
          server-dir: ./
          # Preserve anything Hostinger or Let's Encrypt puts at the site
          # root and never leak our local .git state.
          exclude: |
            **/.git*
            **/.git*/**
            **/.well-known/**
            .user.ini
